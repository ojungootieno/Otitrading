
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTI Trading Dashboard</title>

<style>
body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
}
header{
    background:#161b22;
    padding:20px;
    text-align:center;
}
.container{
    padding:20px;
}
.card{
    background:#161b22;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
.value{
    color:#00d084;
    font-size:22px;
    font-weight:bold;
}
</style>

</head>
<body>

<header>
<h1>OTI Trading Dashboard</h1>
</header>

<div class="container">

<div class="card">
<h2>Login Status</h2>
<p id="status">Checking...</p>
</div>

<div class="card">
<h2>Access Token</h2>
<p id="token">Not available</p>
</div>

</div>

<script>

const token = localStorage.getItem("deriv_token");

if(token){

document.getElementById("status").innerHTML =
"<span class='value'>Logged in successfully ✅</span>";

document.getElementById("token").textContent =
token.substring(0,25)+"...";

}else{

document.getElementById("status").innerHTML =
"<span style='color:red'>Not logged in</span>";

}

</script>

</body>
</html>
